<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80">
  <rect width="240" height="80" fill="white"/>
  <!-- Raiffeisen cogwheel - yellow gear symbol faithful to real brand -->
  <g transform="translate(8,8)">
    <!-- Outer gear teeth -->
    <path d="M32,4 L36,10 L42,8 L44,14 L50,14 L50,20 L56,22 L54,28 L60,32 L56,36 L58,42 L52,44 L52,50 L46,50 L44,56 L38,54 L32,60 L26,54 L20,56 L18,50 L12,50 L12,44 L6,42 L8,36 L4,32 L10,28 L8,22 L14,20 L14,14 L20,14 L22,8 L28,10 Z" fill="#FFDD00"/>
    <!-- Center circle cutout -->
    <circle cx="32" cy="32" r="13" fill="white"/>
    <!-- Center dot -->
    <circle cx="32" cy="32" r="5" fill="#FFDD00"/>
  </g>
  <!-- Text: Raiffeisen Bank -->
  <text x="82" y="34" font-family="'Arial Black', Arial, sans-serif" font-size="16" font-weight="900" fill="#1A1A1A" letter-spacing="0.5">RAIFFEISEN</text>
  <text x="82" y="54" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1A1A1A" letter-spacing="1">BANK</text>
  <text x="82" y="68" font-family="Arial, sans-serif" font-size="8" font-weight="400" fill="#888888" letter-spacing="0.5">România</text>
</svg>
