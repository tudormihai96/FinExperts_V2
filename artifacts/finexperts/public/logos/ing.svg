<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <rect width="200" height="80" fill="white"/>
  <!-- ING orange lion head (simplified but recognizable) -->
  <g transform="translate(6,6)">
    <rect width="68" height="68" rx="10" fill="#FF6200"/>
    <!-- Lion stylized -->
    <ellipse cx="34" cy="28" rx="14" ry="12" fill="#FFAA44"/>
    <ellipse cx="34" cy="26" rx="9" ry="9" fill="#FF8800"/>
    <!-- Mane spikes -->
    <path d="M22,22 L18,14 L26,18 M46,22 L50,14 L42,18 M34,15 L34,8 M24,30 L16,28 M44,30 L52,28" stroke="#FF6200" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Face features -->
    <ellipse cx="29" cy="25" rx="2.5" ry="3" fill="white"/>
    <ellipse cx="39" cy="25" rx="2.5" ry="3" fill="white"/>
    <ellipse cx="29" cy="25" rx="1.2" ry="1.8" fill="#1A1A1A"/>
    <ellipse cx="39" cy="25" rx="1.2" ry="1.8" fill="#1A1A1A"/>
    <!-- Nose -->
    <ellipse cx="34" cy="31" rx="4" ry="2.5" fill="#CC5500"/>
    <!-- Tail/body -->
    <path d="M26,38 Q34,50 42,38" stroke="#FFAA44" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Paws -->
    <ellipse cx="24" cy="52" rx="8" ry="6" fill="#FFAA44"/>
    <ellipse cx="44" cy="52" rx="8" ry="6" fill="#FFAA44"/>
    <text x="34" y="66" font-family="'Arial Black', Arial, sans-serif" font-size="10" font-weight="900" fill="white" text-anchor="middle">ING</text>
  </g>
  <text x="84" y="42" font-family="'Arial Black', Arial, sans-serif" font-size="26" font-weight="900" fill="#FF6200" letter-spacing="-0.5">ING</text>
  <text x="84" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#888">Bank România</text>
</svg>
