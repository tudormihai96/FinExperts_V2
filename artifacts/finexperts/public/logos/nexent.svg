<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <rect width="200" height="80" fill="white"/>
  <!-- Nexent Bank - modern dark brand (formerly Banca Feroviara) -->
  <rect x="8" y="8" width="184" height="64" rx="6" fill="#1E293B"/>
  <!-- N geometric mark -->
  <g transform="translate(30,22)">
    <rect width="10" height="36" rx="2" fill="white"/>
    <path d="M10,0 L30,36 L40,36 L40,0" fill="none" stroke="white" stroke-width="10" stroke-linejoin="round"/>
  </g>
  <text x="120" y="46" font-family="'Arial Black', Arial, sans-serif" font-size="18" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">NEXENT</text>
  <text x="120" y="62" font-family="Arial, sans-serif" font-size="9" font-weight="400" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="2">BANK</text>
</svg>
