<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80">
  <rect width="240" height="80" fill="white"/>
  <!-- Intesa Sanpaolo dark blue brand - green circle logo -->
  <circle cx="36" cy="40" r="28" fill="#003082"/>
  <!-- ISP letters -->
  <text x="36" y="46" font-family="'Arial Black', Arial, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">ISP</text>
  <!-- Green accent bar (Intesa Sanpaolo signature green) -->
  <rect x="64" y="36" width="3" height="28" fill="#00A651" rx="1.5"/>
  <!-- Text -->
  <text x="76" y="30" font-family="Arial, sans-serif" font-size="15" font-weight="800" fill="#003082">Intesa</text>
  <text x="76" y="48" font-family="Arial, sans-serif" font-size="15" font-weight="800" fill="#003082">Sanpaolo</text>
  <text x="76" y="64" font-family="Arial, sans-serif" font-size="9" font-weight="400" fill="#555" letter-spacing="0.5">Bank Romania</text>
</svg>
