  <!-- Text -->
  <text x="82" y="32" font-family="Arial, sans-serif" font-size="15" font-weight="800" fill="#6B21A8" letter-spacing="0.2">Libra Internet</text>
  <text x="82" y="50" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#6B21A8">Bank</text>
  <text x="82" y="65" font-family="Arial, sans-serif" font-size="8" fill="#888">bancă 100% digitală</text>
