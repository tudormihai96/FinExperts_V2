kind = "web"
previewPath = "/"
title = "FinExperts — Calculator Credite"
version = "1.0.0"
id = "artifacts/finexperts"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22467

[services.development]
run = "pnpm --filter @workspace/finexperts run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finexperts", "run", "build" ]
publicDir = "artifacts/finexperts/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22467"
BASE_PATH = "/"
