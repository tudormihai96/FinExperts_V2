<script type="text/javascript">
	$(document).ready(function() {
		var qStrings = window.location.toString().toLowerCase();
		var isEmbeddedInHb = qStrings.indexOf('aplication=homebank') > -1;
		if (isEmbeddedInHb) {
			$("a").each( function(index, link){
				var href = $(link).attr("href");
				if (href.indexOf('aplication=homebank') === -1) {
					if (href.indexOf('?') === -1) {
						$(link).attr("href", href + "?aplication=homebank");
					} else {
						$(link).attr("href", href + "&aplication=homebank");
					}
				}
			})
		}
	});
</script>







